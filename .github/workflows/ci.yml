# Vercel 배포와 동일한 파이프라인: install → lint → build
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 저장소 루트 = nexus-ai (yuaimarketing)
defaults:
  run:
    working-directory: .

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test (backend)
        run: npm run test

      - name: Security audit (high)
        continue-on-error: true
        run: npm audit --audit-level=high

      # Policy: inject VITE_SUPABASE_* from Repository Secrets when set (prod-like bundle).
      # Always set VITE_ALLOW_BUILD_WITHOUT_SUPABASE so forks/PRs without secrets still pass build.
      # To fail CI when Supabase vars are missing, remove VITE_ALLOW_BUILD_WITHOUT_SUPABASE (main repo only).
      - name: Build (backend + frontend + landing)
        env:
          VITE_ALLOW_BUILD_WITHOUT_SUPABASE: "true"
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build
