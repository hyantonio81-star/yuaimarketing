# Vercel 배포와 동일한 파이프라인: install → lint → build
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 저장소 루트 = nexus-ai (yuaimarketing)
defaults:
  run:
    working-directory: .

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test (backend)
        run: npm run test

      - name: Security audit (high)
        run: npm audit --audit-level=high

      - name: Build (backend + frontend + landing)
        run: npm run build
