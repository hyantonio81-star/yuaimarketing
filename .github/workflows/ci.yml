# Vercel 배포와 동일한 파이프라인: install → lint → build
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 저장소 루트 = nexus-ai (yuaimarketing)
defaults:
  run:
    working-directory: .

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test (backend)
        run: npm run test

      - name: Security audit (high)
        continue-on-error: true
        run: npm audit --audit-level=high

      # 프론트 프로덕션 빌드는 VITE_SUPABASE_* 필요. CI에는 기본으로 스킵 플래그(포크/PR 대비).
      # 프로덕션과 동일한 번들 검증: Repository Secrets에 VITE_SUPABASE_URL·VITE_SUPABASE_ANON_KEY 추가 후 아래 env에서 ALLOW 줄을 제거.
      - name: Build (backend + frontend + landing)
        env:
          VITE_ALLOW_BUILD_WITHOUT_SUPABASE: "true"
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build
