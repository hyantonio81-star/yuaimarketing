name: Inspection Sync Gate

on:
  push:
    paths:
      - "app/**"
      - "frontend/**"
      - "docs/OFFLINE_SYNC_VALIDATION.md"
      - "tests/**"
      - ".github/workflows/inspection-sync-gate.yml"
  pull_request:
    paths:
      - "app/**"
      - "frontend/**"
      - "docs/OFFLINE_SYNC_VALIDATION.md"
      - "tests/**"
      - ".github/workflows/inspection-sync-gate.yml"

jobs:
  backend-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Backend compile check
        run: python -m compileall app
      - name: Sync contract tests
        run: python -m pytest tests/e2e/test_sync_contracts.py -q

  frontend-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Verify PWA assets
        run: |
          test -f public/icon-192.png
          test -f public/icon-512.png
          test -f public/apple-touch-icon-180.png
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Playwright sync smoke
        run: npm run test:e2e -- --project=chromium
