# SmartKPI - 로컬 풀 스택 (PostgreSQL + Backend + Frontend)
# 사용: docker-compose up -d
# 프론트: http://localhost:5173  백엔드: http://localhost:8000

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: kpi
      POSTGRES_PASSWORD: kpi_secret
      POSTGRES_DB: kpi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/docker-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kpi -d kpi_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://kpi:kpi_secret@postgres:5432/kpi_db
      JWT_SECRET: change-me-in-production-use-long-random-string
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      REQUIRE_DATABASE: "true"
      SERVER_MODE: local
      # Supabase (배포 시 .env 또는 여기서 설정)
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://backend:8000
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    depends_on:
      - backend

volumes:
  postgres_data:
